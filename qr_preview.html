<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>扫码预览</title>
<style>
  body {
    background: #faf5ee;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .card {
    text-align: center;
    background: #fffefb;
    padding: 40px 32px;
    border-radius: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    max-width: 320px;
  }
  .card img { width: 220px; height: 220px; border-radius: 12px; }
  .card h3 { color: #4a7c59; margin: 20px 0 8px; font-size: 18px; }
  .card p { color: #8b7e6a; font-size: 13px; margin: 0; word-break: break-all; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <img src="qr_preview.png" alt="扫码预览">
  <h3>📱 手机扫码预览</h3>
  <p>http://192.168.1.18:8888/index.html</p>
</div>
</body>
</html>
